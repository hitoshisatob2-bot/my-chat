<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kubota WSM AI</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      background-color: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 85%;
      max-width: 420px;
    }
    /* 🚀 巨大なボタン */
    .main-btn {
      background: #4285f4;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 20px 40px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(66,133,244,0.4);
      transition: transform 0.2s;
      width: 100%;
      max-width: 320px;
    }
    .main-btn:active { transform: scale(0.95); }

    .note {
      color: #666;
      margin-bottom: 22px;
      line-height: 1.5;
    }
    .small {
      font-size: 12px;
      color: #999;
      margin-top: 18px;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2 style="margin-bottom: 18px;">kubota WSM AI.o</h2>

    <p class="note">
      下のボタンを押して開始します。
    </p>

    <button id="start-btn" class="main-btn">AIチャットを開始</button>

    <div class="small">
      ※ チャット内で音声検索を利用する場合は、<br>
      スマホのキーボードマイクを使ってください。
    </div>
  </div>

  <gen-search-widget
    configId="641e8208-ac63-4d51-a816-f864dfd00f27"
    triggerId="start-btn"
    max-results="1"
    enable-source-grounding="true"
    enable-voice-search="true">
  </gen-search-widget>

  <script src="https://cloud.google.com/ai/gen-app-builder/client?hl=ja"></script>

</body>
</html>
